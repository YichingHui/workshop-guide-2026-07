<title>老板AI管理工作坊
第四期课前须知
7月10日～12日</title>
<style>
  :root {
    --blue: #0066fe;
    --ink: #111111;
    --muted: #666a73;
    --soft: #f6f3ec;
    --line: rgba(17, 17, 17, 0.12);
    --panel: rgba(255, 255, 255, 0.72);
    --shadow: 0 18px 50px rgba(17, 17, 17, 0.08);
    color-scheme: light;
  }

  * { box-sizing: border-box; }

  html {
    margin: 0;
    background: var(--soft);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0;
  }

  html::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -2;
    background:
      radial-gradient(circle at 10% 0%, rgba(0, 102, 254, 0.08), transparent 26rem),
      radial-gradient(circle at 88% 22%, rgba(255, 204, 75, 0.14), transparent 22rem),
      linear-gradient(180deg, #f8f6f0 0%, #f4f0e7 100%);
  }

  html::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    opacity: 0.18;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.42'/%3E%3C/svg%3E");
  }

  body {
    margin: 0;
    min-width: 320px;
    overflow-x: hidden;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  button {
    font: inherit;
  }

  .page {
    width: min(100%, 760px);
    max-width: 100vw;
    margin: 0 auto;
    padding: 18px 18px 36px;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    min-height: 38px;
    border-bottom: 1px solid rgba(17, 17, 17, 0.76);
    font-size: 12px;
    color: #4d5056;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    font-weight: 650;
  }

  .brand::before {
    content: "";
    width: 11px;
    height: 11px;
    background: var(--blue);
    display: inline-block;
  }

  .topbar .issue {
    color: #8a8d93;
    letter-spacing: 1.5px;
    text-align: right;
    white-space: nowrap;
  }

  .hero {
    padding: 28px 0 22px;
  }

  .kicker {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 0 14px;
    border: 1px solid rgba(0, 102, 254, 0.36);
    background: rgba(0, 102, 254, 0.07);
    color: var(--blue);
    border-radius: 6px;
    font-size: 13px;
    font-weight: 750;
  }

  h1 {
    margin: 18px 0 0;
    font-size: clamp(40px, 12vw, 76px);
    line-height: 0.98;
    letter-spacing: 0;
    font-weight: 950;
  }

  .title-line {
    display: block;
    white-space: nowrap;
  }

  .blue { color: var(--blue); }

  .subtitle {
    margin: 18px 0 0;
    font-size: clamp(19px, 5.3vw, 34px);
    line-height: 1.24;
    font-weight: 760;
    color: #26282d;
    overflow-wrap: anywhere;
  }

  .lead {
    margin: 14px 0 0;
    color: #4f535c;
    font-size: 15px;
    line-height: 1.75;
    overflow-wrap: anywhere;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 20px;
  }

  .cover {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.62);
    box-shadow: var(--shadow);
    aspect-ratio: 1.35;
    border-radius: 8px;
  }

  .cover img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 6%;
    filter: saturate(0.94) contrast(1.02);
  }

  .cover::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(246, 243, 236, 0.02), rgba(246, 243, 236, 0.74));
  }

  .quick-panel {
    display: grid;
    gap: 10px;
  }

  .content-grid {
    display: grid;
    gap: 10px;
  }

  .content-card {
    display: grid;
    gap: 9px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.68);
  }

  .content-index {
    color: var(--blue);
    font-size: 12px;
    font-weight: 850;
    letter-spacing: 2px;
  }

  .content-title {
    font-size: 18px;
    line-height: 1.45;
    font-weight: 880;
  }

  .content-text {
    color: #626773;
    font-size: 14px;
    line-height: 1.7;
    overflow-wrap: anywhere;
  }

  .content-list {
    display: grid;
    gap: 8px;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .content-list li {
    position: relative;
    padding-left: 16px;
    color: #626773;
    font-size: 13px;
    line-height: 1.65;
  }

  .content-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0.72em;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--blue);
  }

  .scene-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .scene-tag {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 0 10px;
    border: 1px solid rgba(0, 102, 254, 0.22);
    border-radius: 7px;
    color: var(--blue);
    background: rgba(0, 102, 254, 0.05);
    font-size: 13px;
    font-weight: 760;
  }

  .flow-grid {
    display: grid;
    gap: 8px;
    margin-top: 12px;
  }

  .flow-item {
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 10px;
    padding: 13px 14px;
    border: 1px solid rgba(0, 102, 254, 0.18);
    border-radius: 8px;
    background: rgba(0, 102, 254, 0.05);
  }

  .flow-day {
    color: var(--blue);
    font-size: 12px;
    font-weight: 850;
    letter-spacing: 1.5px;
  }

  .flow-title {
    font-size: 15px;
    line-height: 1.55;
    font-weight: 820;
  }

  .flow-text {
    margin-top: 2px;
    color: #6b707b;
    font-size: 13px;
    line-height: 1.6;
  }

  .fact {
    display: grid;
    grid-template-columns: 86px 1fr;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
  }

  .fact .label {
    font-size: 12px;
    color: #8c8f95;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding-top: 2px;
  }

  .fact .value {
    min-width: 0;
    font-size: 16px;
    line-height: 1.55;
    font-weight: 720;
    overflow-wrap: anywhere;
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 14px;
  }

  .action,
  .copy-button {
    min-height: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid rgba(0, 102, 254, 0.32);
    background: rgba(0, 102, 254, 0.08);
    color: var(--blue);
    font-size: 15px;
    font-weight: 760;
    cursor: pointer;
  }

  .action.primary {
    border-color: var(--blue);
    background: var(--blue);
    color: #ffffff;
  }

  .section {
    padding: 30px 0 0;
    margin-top: 2px;
    border-top: 1px solid var(--line);
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 16px;
    margin-bottom: 16px;
  }

  .eyebrow {
    color: #9a9ca2;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 680;
  }

  h2 {
    margin: 7px 0 0;
    font-size: 25px;
    line-height: 1.18;
    font-weight: 900;
  }

  .section-note {
    color: #74777f;
    font-size: 13px;
    line-height: 1.55;
    text-align: right;
    max-width: 170px;
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .schedule {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .day {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.66);
    overflow: hidden;
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    padding: 12px 10px;
    border-bottom: 1px solid var(--line);
  }

  .day-index {
    color: var(--blue);
    font-size: 10px;
    font-weight: 850;
    letter-spacing: 1.2px;
  }

  .day-date {
    margin-top: 2px;
    font-size: 17px;
    font-weight: 900;
    line-height: 1.2;
  }

  .slot {
    display: grid;
    gap: 3px;
    padding: 10px;
    border-bottom: 1px solid rgba(17, 17, 17, 0.07);
  }

  .slot:last-child { border-bottom: none; }

  .slot-part {
    color: var(--blue);
    font-size: 12px;
    font-weight: 820;
  }

  .slot-time {
    font-size: 13px;
    line-height: 1.35;
    font-weight: 850;
    overflow-wrap: anywhere;
  }

  .slot-desc {
    margin-top: 3px;
    color: #5e626b;
    font-size: 14px;
    line-height: 1.55;
    overflow-wrap: anywhere;
  }

  .schedule-explain {
    margin: 12px 0 0;
    padding: 14px;
    border-left: 3px solid var(--blue);
    background: rgba(0, 102, 254, 0.06);
    color: #515662;
    font-size: 13px;
    line-height: 1.75;
  }

  .checklist {
    display: grid;
    gap: 12px;
  }

  .requirement {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 12px;
    padding: 16px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.68);
    border-radius: 8px;
  }

  .number {
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    background: var(--blue);
    color: #ffffff;
    font-size: 17px;
    font-weight: 900;
  }

  .requirement-title {
    font-size: 17px;
    line-height: 1.5;
    font-weight: 800;
    overflow-wrap: anywhere;
  }

  .requirement-text {
    margin-top: 5px;
    color: #686c75;
    font-size: 14px;
    line-height: 1.65;
    overflow-wrap: anywhere;
  }

  .transport,
  .hotels {
    display: grid;
    gap: 10px;
  }

  .transport-item,
  .hotel {
    display: grid;
    gap: 8px;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.68);
  }

  .transport-main,
  .hotel-main {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 14px;
  }

  .place,
  .hotel-name {
    min-width: 0;
    font-size: 17px;
    line-height: 1.4;
    font-weight: 820;
    overflow-wrap: anywhere;
  }

  .duration,
  .price {
    color: var(--blue);
    font-size: 18px;
    font-weight: 900;
    white-space: nowrap;
  }

  .hotel-desc,
  .hotel-address,
  .transport-desc {
    color: #70747d;
    font-size: 13px;
    line-height: 1.6;
    overflow-wrap: anywhere;
  }

  .hotel-address {
    color: #4f5561;
  }

  .hotel-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .hotel-link {
    min-height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    border-radius: 7px;
    border: 1px solid rgba(0, 102, 254, 0.22);
    background: rgba(0, 102, 254, 0.06);
    color: var(--blue);
    font-size: 13px;
    font-weight: 760;
    font-family: inherit;
    cursor: pointer;
  }

  .contact {
    background: #111111;
    color: #ffffff;
    border-radius: 8px;
    padding: 22px 18px;
    margin-top: 16px;
  }

  .contact .eyebrow {
    color: rgba(255, 255, 255, 0.48);
  }

  .phone {
    display: block;
    margin-top: 12px;
    font-size: clamp(36px, 12vw, 64px);
    line-height: 1;
    font-weight: 950;
    letter-spacing: 1px;
  }

  .contact-desc {
    margin-top: 12px;
    color: rgba(255, 255, 255, 0.72);
    font-size: 14px;
    line-height: 1.65;
  }

  .contact-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 18px;
  }

  .contact-actions .action,
  .contact-actions .copy-button {
    background: #ffffff;
    color: #111111;
    border-color: #ffffff;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid rgba(17, 17, 17, 0.2);
    color: #70747d;
    font-size: 12px;
    line-height: 1.5;
  }

  .footer-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: #111111;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 4px;
    white-space: nowrap;
  }

  .footer-brand::before {
    content: "";
    width: 18px;
    height: 18px;
    background: var(--blue);
    display: inline-block;
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: max(18px, env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    min-width: 190px;
    max-width: calc(100vw - 36px);
    padding: 12px 16px;
    background: rgba(17, 17, 17, 0.92);
    color: #ffffff;
    border-radius: 999px;
    font-size: 14px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 30;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (min-width: 720px) {
    .page {
      padding: 28px 28px 50px;
    }

    .hero-grid {
      grid-template-columns: 0.95fr 1.05fr;
      align-items: stretch;
    }

    .schedule {
      align-items: stretch;
      gap: 10px;
    }

    .day {
      display: flex;
      flex-direction: column;
    }

    .transport {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .transport-main {
      display: grid;
      gap: 6px;
    }

    .hotels {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .content-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .hotel-actions {
      margin-top: auto;
    }
  }

  @media (max-width: 390px) {
    .page {
      padding-left: 14px;
      padding-right: 14px;
    }

    .topbar {
      font-size: 11px;
    }

    .topbar .issue {
      letter-spacing: 1px;
    }

    .fact {
      grid-template-columns: 76px 1fr;
      padding: 13px;
    }

    .actions,
    .hotel-actions,
    .contact-actions {
      grid-template-columns: 1fr;
    }

    .transport-main,
    .hotel-main {
      display: grid;
      gap: 4px;
    }
  }

  @media (max-width: 620px) {
    .section-head {
      align-items: flex-start;
      flex-direction: column;
      gap: 8px;
    }

    .section-note {
      max-width: none;
      text-align: left;
    }

    .actions,
    .hotel-actions,
    .contact-actions {
      grid-template-columns: 1fr;
    }

    .transport-main,
    .hotel-main {
      display: grid;
      gap: 4px;
    }
  }

  @media print {
    .page {
      width: 760px;
      padding: 20px;
    }
  }
</style>
</head>

    contentModules: [

  const app = document.querySelector("#app");

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
  }

  async function copyText(text, successText) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const input = document.createElement("textarea");
        input.value = text;
        input.setAttribute("readonly", "");
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      }
      showToast(successText);
    } catch (error) {
      showToast("复制失败，可手动复制：" + text);
    }
  }

  function renderFacts(facts) {
    return facts.map((fact) => `
      <div class="fact">
        <div class="label">${escapeHtml(fact.label)}</div>
        <div class="value">${escapeHtml(fact.value)}</div>
      </div>
    `).join("");
  }

  function renderSchedule(days) {
    return days.map((day) => `
      <article class="day">
        <div class="day-header">
          <div>
            <div class="day-index">${escapeHtml(day.index)}</div>
            <div class="day-date">${escapeHtml(day.date)}</div>
          </div>
        </div>
        ${day.slots.map((slot) => `
          <div class="slot">
            <div class="slot-part">${escapeHtml(slot.part)}</div>
            <div>
              <div class="slot-time">${escapeHtml(slot.time)}</div>
              ${slot.desc ? `<div class="slot-desc">${escapeHtml(slot.desc)}</div>` : ""}
            </div>
          </div>
        `).join("")}
      </article>
    `).join("");
  }
